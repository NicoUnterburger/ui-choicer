version: '3.8'

services:
  unifi-portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: unifi-network-portal:latest
    container_name: unifi-portal
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # Optional: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    labels:
      - "com.docker.compose.project=unifi-portal"
      - "traefik.enable=false"

